<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunny Adventures Gallery</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <h1>Bunny Adventures Gallery</h1>
        <p class="subtitle">Explore our adorable collection of bunny moments with carrots, phones, and pure cuteness</p>
        
        <input type="radio" name="filter" id="all" checked>
        <input type="radio" name="filter" id="playful">
        <input type="radio" name="filter" id="carrots">
        <input type="radio" name="filter" id="jumping">
        <input type="radio" name="filter" id="happy">

        <div class="filter-buttons">
            <label for="all" class="filter-btn">All Bunnies</label>
            <label for="playful" class="filter-btn">Playful</label>
            <label for="carrots" class="filter-btn">With Carrots</label>
            <label for="jumping" class="filter-btn">Jumping</label>
            <label for="happy" class="filter-btn">Happy</label>
        </div>

        <div class="gallery">
            <div class="gallery-item" data-category="playful">
                <img src="img1.png" alt="Bunny with phone">
            </div>
            <div class="gallery-item" data-category="carrots">
                <img src="img2.png" alt="Bunny with carrot">
            </div>
            <div class="gallery-item" data-category="jumping">
                <img src="img3.png" alt="Bunny on carrot">
            </div>
            <div class="gallery-item" data-category="happy">
                <img src="img4.png" alt="Happy bunny">
            </div>
            <div class="gallery-item" data-category="playful">
                <img src="img5.png" alt="Bunny eating carrot">
            </div>
            <div class="gallery-item" data-category="carrots">
                <img src="img6.png" alt="Bunny standing on carrot">
            </div>
            <div class="gallery-item" data-category="jumping">
                <img src="img7.png" alt="Excited bunny">
            </div>
        </div>
    </div>
</body>
</html>
