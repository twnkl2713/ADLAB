<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Assignment 4</title>
    <link rel="stylesheet" href="style1login.css">
</head>
<body>
    <div class="container">
        <!-- Left Hero Section -->
        <div class="hero-section">
            <div class="logo">AMU</div>
            <button class="back-button">Back to website →</button>           
            <div class="hero-content">
                <h2 class="hero-title">Capturing Moments,<br>Creating Memories</h2>
                <div class="carousel-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot active"></div>
                </div>
            </div>
        </div>
        <!-- Right Form Section -->
        <div class="form-section">
            <div class="form-container">
                <h1>Welcome back</h1>
                <p class="signup-link">Don't have an account? <a href="index1.html">Sign up</a></p>
                <form>
                    <div class="form-group">
                        <input type="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" placeholder="Password" required>
                    </div>
                    <div class="remember-forgot">
                        <div class="remember-group">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#">Forgot password?</a>
                    </div>
                    <button type="submit" class="submit-button">Log in</button>                   
                </form>
            </div>
        </div>
    </div>
</body>
</html>
