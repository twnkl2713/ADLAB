<!DOCTYPE html>
<html>
    <head>
        <title>HTML Form</title>
    </head>
    <body>
        <h2>HTML Form</h2>
        <form>
            <!-- Text -->
            <label>Full Name:</label>
            <input type="text" name="fullname"><br><br>

            <!-- Username -->
            <label>Username:</label>
            <input type="text" name="username" maxlength="10"><br><br>

            <!-- Password -->
            <label>Password:</label>
            <input type="password" name="password"><br><br>

            <!-- Email -->
            <label>Email:</label>
            <input type="email" name="email"><br><br>

            <!-- Number -->
            <label>Age:</label>
            <input type="number" name="age" min="1" max="100"><br><br>

            <!-- Radio Buttons -->
            <label>Gender:</label>
            <input type="radio" name="gender" value="male"> Male
            <input type="radio" name="gender" value="female"> Female
            <input type="radio" name="gender" value="other"> Other <br><br> 
            
            <!-- Checkbox -->
            <label>Skills:</label><br>
            <input type="checkbox" name="skill" value="java"> Java <br>
            <input type="checkbox" name="skill" value="python"> Python <br>
            <input type="checkbox" name="skill" value="html"> HTML <br>
            <input type="checkbox" name="skill" value="css"> CSS <br><br>

            <!-- Select Dropdown -->
            <label>Country:</label>
            <select name="country">
            <option value="">Select</option>
            <option>India</option>
            <option>USA</option>
            <option>Japan</option>
            <option>Canada</option>
            </select><br><br>

            <!-- Multiple Select -->
            <label>Select Hobbies (multiple):</label><br>
            <select name="hobby" multiple>
                <option>Reading</option>
                <option>Music</option>
                <option>Gaming</option>
                <option>Traveling</option>
                <option>Cooking</option>
                <option>Sports</option>
                <option>Dancing</option>
            </select><br><br>

            <!-- Date -->
            <label>Date of Birth:</label>
            <input type="date" name="dob"><br><br>

            <!-- Time -->
            <label>Preferred Time:</label>
            <input type="time" name="time"><br><br>

            <!-- Color Picker -->
            <label>Favorite Color:</label>
            <input type="color" name="color"><br><br>

            <!-- Range -->
            <label>Rate Your Coding Skills (1-10):</label>
            <input type="range" min="1" max="10"><br><br>

            <!-- File Upload -->
            <label>Upload Document:</label>
            <input type="file" name="file"><br><br>

            <!-- URL -->
            <label>Your Website:</label>
            <input type="url" name="website"><br><br>

            <!-- Search -->
            <label>Search:</label>
            <input type="search" name="search"><br><br>

            <!-- Telephone -->
            <label>Phone Number:</label>
            <input type="tel" name="phone" placeholder="123-456-7890"><br><br>

            <!-- Textarea -->
            <label>Comments:</label><br>
            <textarea name="comments" rows="5" cols="30"></textarea><br><br>

            <!-- Buttons -->
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">

        </form>
    </body>
</html>
